name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy app

      - name: Run tests
        run: pytest -q

      - name: Alembic check (schema is migratable)
        run: |
          alembic upgrade head
          alembic check
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
