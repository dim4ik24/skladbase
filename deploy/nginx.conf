# SkladBase — nginx reverse proxy + HTTPS termination + статика TMA.
# Шаблон; підстав свій домен/шляхи до сертифікатів перед деплоєм.

server {
    listen 80;
    server_name your-domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 10m;  # > MAX_PHOTO_UPLOAD_MB (app/config.py) із запасом

    # Статика TMA — напряму з nginx, не через uvicorn (швидше, не вантажить
    # web-процес). FastAPI теж вміє роздавати ці файли (app/main.py,
    # "Serve built TMA from FastAPI") — як fallback, якщо nginx-шлях недоступний.
    location / {
        root /opt/skladbase/frontend/app/dist;
        try_files $uri $uri/ /index.html;
    }

    # API, вебхуки платежів/Telegram, health — на uvicorn.
    location ~ ^/(api|webhook|health)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Без цього rate_limit.client_ip() і ProxyHeadersMiddleware
        # (app/security/proxy_headers.py) бачать лише IP nginx, не клієнта.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}
