services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skladbase
      POSTGRES_USER: skladbase
      POSTGRES_PASSWORD: skladbase
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skladbase"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://skladbase:skladbase@db:5432/skladbase
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pg_data:
