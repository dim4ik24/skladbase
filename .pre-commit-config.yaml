repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: [app, --config-file=pyproject.toml]
        additional_dependencies:
          - sqlalchemy[asyncio]>=2.0
          - pydantic-settings>=2.3
